# GICP Configuration for SC_PGO Loop Closure Refinement

# Enable GICP refinement after BTC loop detection
use_gicp_for_loop_closure: true

# Fitness score threshold for accepting GICP result
# Lower values mean stricter alignment quality
gicp_fitness_score_threshold: 0.5

# GICP Algorithm Parameters
gicp_transformation_epsilon: 1e-6          # Transformation convergence threshold
gicp_max_correspondence_distance: 30.0     # Maximum distance between corresponding points
gicp_max_iterations: 100                   # Maximum number of iterations
gicp_num_threads: 4                        # Number of threads for parallel computation

# Advanced GICP Parameters (optional)
# gicp_rotation_epsilon: 0.002             # Rotation convergence threshold
# gicp_k_correspondences: 20               # Number of neighbors to use for correspondence
# gicp_max_optimizer_iterations: 20       # Maximum optimizer iterations
# gicp_epsilon: 0.01                       # GICP specific epsilon