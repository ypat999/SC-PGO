%YAML:1.0
# BTC + GICP + 关键帧 + 回环验证 统一配置文件
# 策略: BTC层尽量多召回候选，GICP层严格筛选

# 平面检测（放宽，多提取平面）
voxel_size: 0.4
voxel_init_num: 1
plane_detection_thre: 0.03

# 平面合并（放宽，减少合并损失）
plane_merge_normal_thre: 0.25
plane_merge_dis_thre: 0.8

# 二进制描述子（多生成描述子）
proj_plane_num: 5
proj_dis_min: 0
proj_dis_max: 10
proj_image_resolution: 0.8
proj_image_high_inc: 0.8
summary_min_thre: 1
line_filter_enable: 0

# BTC 生成（多生成三角形，提高召回）
descriptor_near_num: 5
descriptor_min_len: 0.3
descriptor_max_len: 30
useful_corner_num: 30
non_max_suppression_radius: 1.5

# 回环检测（候选选择放宽）
skip_near_num: 2
candidate_num: 50
rough_dis_threshold: 0.10
similarity_threshold: 0.4
icp_threshold: 0.15

# 验证（由GICP fitness阈值接管筛选）
normal_threshold: 0.3
dis_threshold: 0.6
triangle_resolution: 0.4

# ======================== GICP 配置 ========================

gicp:
  # 是否启用 GICP 精化（设为 false 则仅用 BTC 相对位姿）
  enabled: true

  # Fitness score 阈值：低于此值才接受 GICP 结果
  fitness_score_threshold: 0.3

  # 最大对应点距离 (m)
  max_correspondence_distance: 3.0

  # 最大迭代次数
  max_iterations: 32

  # 变换收敛精度
  transformation_epsilon: 0.001

  # GICP 协方差正则化（定位参数中 gicp_epsilon）
  gicp_epsilon: 0.001

  # 点云下采样体素大小 (m)
  scan_ds_size: 0.1

# ======================== 关键帧配置 ========================

keyframe:
  meter_gap: 1.0
  deg_gap: 10.0

# ======================== 回环验证 ========================

loop_validation:
  max_distance: 100.0
  max_yaw_diff: 3.2  # 约 0.75π + 余量，允许反向回环
