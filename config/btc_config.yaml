%YAML:1.0
# ================================================================================
# SC-PGO 配置文件 - 支持BTC和ScanContext两种回环检测方法
# ================================================================================
# BTC 算法流程：
#   1. 体素化点云 → 平面检测 → 平面合并
#   2. 从平面中心点中选取角点 → 投影生成二进制描述子
#   3. 3个角点组成三角形 → BTC描述子（边长 + 3个二进制描述子）
#   4. 建立哈希表（三角形边长量化为bucket）→ 回环检索
# ================================================================================
# ScanContext 算法流程：
#   1. 点云投影到极坐标系 → 生成ScanContext描述子矩阵（20x60）
#   2. 使用Ringkey和Sectorkey建立KDTree → 回环检索
#   3. ScanContext距离匹配 → ICP精化验证
# ================================================================================


# ================================================================================
# 关键帧配置（Keyframe Selection）
# ================================================================================
# 原始帧 → 选择关键帧 → BTC只在关键帧上运行

keyframe:
  # meter_gap: 关键帧距离间隔 (m)
  #   - 两帧位置差 > meter_gap 才选为关键帧
  #   - 小值 (1.0): 关键帧多 → 回环召回高但慢
  #   - 大值 (5.0): 关键帧少 → 快但可能漏回环
  meter_gap: 1.0

  # deg_gap: 关键帧角度间隔 (deg)
  #   - 两帧角度差 > deg_gap 才选为关键帧
  #   - 避免：原地旋转时关键帧过多
  deg_gap: 30.0

# ================================================================================
# 回环检测方法选择
# ================================================================================
scancontext:
  # use_method: 回环检测方法选择
  #   - 'btc': 使用BTC (Binary Triangle Context) - 基于平面特征，精度高
  #   - 'sc': 使用ScanContext - 基于全局点云描述子，召回率高
  #   - 'odom_only': 只根据Odom距离进行直接GICP验证，不使用BTC/SC
  use_method: odom_only

  # ScanContext 参数 (仅当 use_method='sc' 时生效)
  # sc_dist_thres: ScanContext距离阈值
  #   - 两帧ScanContext描述子的距离 < 此阈值才认为是回环候选
  #   - 小值 (0.1): 严格 → 回环少但准确
  #   - 大值 (0.6): 宽松 → 回环多但可能有误检
  sc_dist_thres: 0.6

  # sc_max_radius: ScanContext最大半径 (m)
  #   - ScanContext描述子的最大作用范围
  #   - 小场景 (室内): 40-60m
  #   - 大场景 (室外): 80-100m
  sc_max_radius: 80.0

# ================================================================================
# 第一阶段：平面检测（Plane Detection） - 仅BTC使用
# ================================================================================
# 输入点云 → 体素化 → 每个体素拟合平面 → 输出平面点云

# voxel_size: 体素大小 (m)
#   - 小值 (0.2): 体素多 → 平面点多 → BTC描述子多 → 回环召回高但慢
#   - 大值 (0.5): 体素少 → 平面点少 → BTC描述子少 → 快但可能漏回环
#   - 推荐: Mid360稀疏点云用 0.3，密集雷达用 0.5
voxel_size: 0.25

# voxel_init_num: 体素内最小点数阈值
#   - 点数 < voxel_init_num 的体素被丢弃（噪声过滤）
#   - 小值 (1): 保留更多体素 → 平面点多（适合稀疏点云）
#   - 大值 (5): 只保留密集体素 → 平面点少（适合密集点云）
voxel_init_num: 1

# plane_detection_thre: 平面检测阈值（最小奇异值比率）
#   - PCA分解后，最小特征值/最大特征值 < 此阈值才认为是平面
#   - 小值 (0.01): 平面检测宽松 → 更多平面（包括弱平面）
#   - 大值 (0.05): 平面检测严格 → 只保留强平面
plane_detection_thre: 0.03

# ================================================================================
# 第二阶段：平面合并（Plane Merge）
# ================================================================================
# 空间邻近 + 法向量相似的平面 → 合并为一个平面

# plane_merge_normal_thre: 法向量夹角阈值 (cos值)
#   - 两平面法向量夹角 < arccos(threshold) 才考虑合并
#   - 0.1 ≈ 84°: 宽松（几乎垂直也可合并）
#   - 0.3 ≈ 73°: 严格（只合并近似平行平面）
plane_merge_normal_thre: 0.25

# plane_merge_dis_thre: 平面中心距离阈值 (m)
#   - 两平面中心距离 < 此阈值才考虑合并
#   - 小值 (0.3): 只合并非常近的平面
#   - 大值 (1.0): 合并入距离较远的平面
plane_merge_dis_thre: 0.8

# ================================================================================
# 第三阶段：二进制描述子（Binary Descriptor）
# ================================================================================
# 从平面中心点中选取角点 → 投影到多方向平面 → 生成二进制编码

# proj_plane_num: 投影平面数量
#   - 每个角点投影到多个方向平面，生成多个二进制描述子
#   - 多值 (5): 描述子区分度高 → 回环匹配准确
#   - 少值 (3): 描述子少 → 快但区分度降低
proj_plane_num: 3

# proj_dis_min / proj_dis_max: 投影距离范围 (m)
#   - 距离 proj_dis_min ~ proj_dis_max 内的点才参与投影
#   - 过小: 只用近处点 → 描述子不稳定（近处点噪声大）
#   - 过大: 用远处点 → 描述子稳定但计算慢
proj_dis_min: 0
proj_dis_max: 10

# proj_image_resolution: 投影图像分辨率 (m/pixel)
#   - 投影平面划分为网格，网格大小 = resolution
#   - 小值 (0.5): 网格细 → 二进制编码长 → 区分度高但慢
#   - 大值 (1.0): 网格粗 → 二进制编码短 → 快但区分度低
proj_image_resolution: 0.8

# proj_image_high_inc: 投影高度增量 (m)
#   - 沿投影方向分层，每层高度 = high_inc
#   - 用于生成多层级二进制编码
proj_image_high_inc: 0.8

# summary_min_thre: 二进制描述子最小点数阈值
#   - 每个网格内点数 >= summary_min_thre 才标记为 occupied
#   - 小值 (1): 网格容易occupied → 描述子密集
#   - 大值 (3): 网格不容易occupied → 描述子稀疏（更稳定）
summary_min_thre: 3

# line_filter_enable: 线特征过滤开关
#   - 0: 不过滤（保留所有描述子）
#   - 1: 过滤线特征（只保留面特征描述子）
line_filter_enable: 0

# ================================================================================
# 第四阶段：BTC三角形生成（Triangle Generation）
# ================================================================================
# N个角点 → 组合为三角形 → 输出BTC描述子

# descriptor_near_num: 角点邻近搜索数量
#   - 每个角点只与最近的 descriptor_near_num 个角点组成三角形
#   - 小值 (5): 三角形少 → 快但可能漏回环
#   - 大值 (10): 三角形多 → 回环召回高但慢
descriptor_near_num: 10  # 提高到10，生成更多BTC描述子增加召回率

# descriptor_min_len / descriptor_max_len: 三角形边长范围 (m)
#   - 边长在 [min_len, max_len] 内的三角形才保留
#   - 太小三角形 (< 0.3m): 不稳定（噪声敏感）
#   - 太大三角形 (> 30m): 跨越场景区域，误匹配率高
descriptor_min_len: 0.3
descriptor_max_len: 20

# useful_corner_num: 有效角点数量阈值
#   - 保留 score 最高的 useful_corner_num 个角点
#   - 小值 (20): 角点少 → 三角形少 → 快
#   - 大值 (50): 角点多 → 三角形多 → 回环召回高
useful_corner_num: 30  # 增加角点数量，生成更多BTC描述子

# non_max_suppression_radius: NMS半径 (m)
#   - 在此半径内只保留 score 最高的角点（去除重复角点）
#   - 小值 (1.0): 保留更多邻近角点 → 三角形多
#   - 大值 (2.0): 只保留稀疏角点 → 三角形少（更稳定）
non_max_suppression_radius: 1.5

# ================================================================================
# 第五阶段：回环检索（Loop Retrieval）
# ================================================================================
# 当前帧BTC → 哈希表查询 → 候选帧 → RANSAC验证

# skip_near_num: 跳过最近N帧
#   - 当前帧 frame_id 与候选帧 frame_id 差值 > skip_near_num 才考虑回环
#   - 避免：相邻帧（真实运动很小）被误认为回环
#   - 小值 (2): 允许短距离回环（室内小场景）
#   - 大值 (10): 只允许长距离回环（室外大场景）
skip_near_num: 20  # 降低到默认值，适应小规模关键帧集（65帧）

# candidate_num: 候选帧数量阈值
#   - 候选帧投票数 > candidate_num 才进入验证阶段
#   - 小值 (10): 候选多 → 回环召回高但验证慢
#   - 大值 (50): 候选少 → 快但可能漏回环
candidate_num: 3  # 降低阈值，适应小规模关键帧集

# rough_dis_threshold: 粗匹配距离阈值（相对值）
#   - 两BTC三角形边长差 < rough_dis_threshold * 边长 才算匹配
#   - 大值 (0.10): 宽松 → 候选多
#   - 小值 (0.05): 严格 → 候选少但准确
rough_dis_threshold: 0.10

# similarity_threshold: 二进制相似度阈值 (Jaccard)
#   - 两二进制描述子Jaccard相似度 > similarity_threshold 才算匹配
#   - 小值 (0.3): 宽松 → 候选多（但误匹配多）
#   - 大值 (0.5): 严格 → 候选少但准确
similarity_threshold: 0.3  # 降低到0.2，增加匹配几率（首尾帧匹配场景）

# icp_threshold: ICP/BTC验证分数阈值
#   - 平面几何验证分数 > icp_threshold 才接受回环
#   - 分数 = 匹配平面点数 / 总平面点数
#   - 小值 (0.05): 宽松 → 回环多但可能有误检
#   - 大值 (0.30): 严格 → 回环少但准确
#   - ⚠️ Mid360点云稀疏导致平面检测质量差，验证分数通常0.04-0.05
#   - ⚠️ 原值0.15太高导致所有候选被过滤，降低到0.03适应稀疏雷达
#   - 策略：进一步降到0.01，让更多候选通过C++层面，交给GICP最终把关
icp_threshold: 0.01  # ← 极宽松，由GICP把关

# geom_side_std_threshold: 几何一致性 - 三角形边长标准差阈值 (m)
#   - BTC匹配对的三角形边长方差超过此值则拒绝候选
#   - 稀疏点云（Mid360）BTC匹配散度大，需要放宽
#   - 小值 (3.0): 严格 → 只接受边长一致的匹配（密集雷达）
#   - 大值 (10.0): 宽松 → 允许边长波动（稀疏雷达/大场景）
#   - 策略：放宽到12.0让更多候选通过，由GICP最终把关
geom_side_std_threshold: 12.0

# geom_center_std_threshold: 几何一致性 - 中心分布标准差阈值 (m)
#   - BTC匹配对的几何中心分布标准差超过此值则拒绝候选
#   - 稀疏点云场景匹配散度大，需要放宽
#   - 小值 (10.0): 严格
#   - 大值 (25.0): 宽松 → 允许中心分布更分散
#   - 策略：放宽到30.0让更多候选通过，由GICP最终把关
geom_center_std_threshold: 30.0

# ================================================================================
# RANSAC 验证配置 (candidate_verify 内部)
# ================================================================================
# 候选帧的BTC匹配对 → 并行RANSAC投票 → 迭代精化 → 平面几何验证

# ransac_min_vote: RANSAC最小投票数
#   - BTC匹配对经RANSAC验证，投票数 < ransac_min_vote 则跳过平面几何验证
#   - 原硬编码4，改为可配置
#   - 小值 (2): 宽松 → 允许较少角点一致（稀疏场景）
#   - 大值 (4): 严格 → 要求较多角点一致
#   - 策略：降到3，让GICP最终把关
ransac_min_vote: 3

# ransac_max_iterations: 迭代RANSAC最大轮数
#   - 用inlier重算位姿 → 用新位姿找inlier → 反复直到收敛
#   - 小值 (5): 收敛快但可能未到最优
#   - 大值 (20): 收敛充分但慢
ransac_max_iterations: 10

# ransac_sample_max: RANSAC采样最大点数
#   - 总匹配数 / ransac_sample_max = 采样间隔
#   - 小值 (20): 多采样 → 找到好初值概率高但慢
#   - 大值 (100): 少采样 → 快但可能漏好初值
ransac_sample_max: 50

# ransac_correspondence_dis: RANSAC角点对应距离阈值 (m)
#   - 变换后两三角形角点距离 < 此值才算一致
#   - 大值 (5.0): 宽松 → 允许较大变形
#   - 小值 (2.0): 严格
ransac_correspondence_dis: 3.0

# candidate_selector_min_vote: 候选帧最小投票数 (candidate_selector)
#   - 一帧积累的BTC匹配投票数 >= 此值才创建候选进入验证
#   - 原硬编码5，改为可配置
#   - 小值 (3): 宽松 → 更多候选 → 召回高
#   - 大值 (8): 严格 → 候选少但可靠
candidate_selector_min_vote: 5

# candidate_verify_min_pairs: 候选帧最小匹配对数 (candidate_verify)
#   - 候选帧的BTC匹配对数 >= 此值才开始RANSAC验证
#   - 原硬编码5，改为可配置
#   - 小值 (3): 宽松 → 允许少匹配对进入验证
#   - 大值 (10): 严格
candidate_verify_min_pairs: 5

# icp_point_to_point_max: Ceres ICP点对点距离上限 (m)
#   - PlaneGeomrtricIcp中构建ceres残差时，点对点距离 < 此值才加入优化
#   - 原硬编码3，改为可配置
#   - 大值 (5.0): 宽松 → 更多残差项（适合稀疏场景）
#   - 小值 (2.0): 严格
icp_point_to_point_max: 3.0

# ================================================================================
# 回环验证配置（Loop Validation）
# ================================================================================
# 回环候选 → 验证几何合理性 → 接受/拒绝

loop_validation:
  # max_loop_distance: 最大回环距离 (m)
  #   - 两关键帧 odom 位置差 < max_loop_distance 才可能是回环
  #   - 用于过滤明显错误的BTC匹配
  max_loop_distance: 10.0

  # odom_direct_threshold: Odom直接验证阈值 (m)
  #   - 两关键帧 odom 位置差 < odom_direct_threshold 时，跳过BTC直接GICP验证
  #   - 适用场景：首尾帧回环、近距离重访场景
  #   - 小值 (2.0): 只对极近距离帧直接验证（减少误检）
  #   - 大值 (5.0): 对较近距离帧直接验证（提高召回率）
  #   - ⚠️ 配合 skip_near_num 使用，避免邻近帧误检
  odom_direct_threshold: 3.0

  max_yaw_diff: 6.28  # 最大偏航角差 (rad)
  #   - 两关键帧 odom 偏航角差 < max_yaw_diff 才可能是回环
  #   - 用于过滤明显错误的BTC匹配
  #   - 小值 (0.75π): 只对极近距离帧直接验证（减少误检）
  #   - 大值 (1.5π): 对较近距离帧直接验证（提高召回率）
  #   - ⚠️ 配合 skip_near_num 使用，避免邻近帧误检

# ================================================================================
# 第六阶段：平面几何验证（Plane Geometric Verification）
# ================================================================================
# BTC粗匹配 → 平面点KDTree查询 → 法向量+距离验证

# normal_threshold: 法向量夹角阈值 (cos值)
#   - 变换后两平面点法向量夹角 < arccos(threshold) 才算匹配
#   - 小值 (0.2 ≈ 78°): 宽松 → 允许更大夹角偏差
#   - 大值 (0.5 ≈ 60°): 严格 → 只允许小夹角偏差
normal_threshold: 0.3

# dis_threshold: 点到平面距离阈值 (m)
#   - 变换后点到目标平面的垂直距离 < dis_threshold 才算匹配
#   - 大值 (1.0): 宽松（适应位姿误差）
#   - 小值 (0.3): 严格（要求位姿精确）
#   - ⚠️ Mid360点云稀疏导致平面检测噪声大，需要放宽距离阈值
dis_threshold: 1.0  # ← 放宽以适应Mid360稀疏点云

# triangle_resolution: 三角形边长量化分辨率 (m)
#   - 三角形边长 / resolution → 哈希bucket索引
#   - 小值 (0.1): bucket细 → 区分度高 → 候选少
#   - 大值 (0.5): bucket粗 → 区分度低 → 候选多
triangle_resolution: 0.4

# ================================================================================
# GICP 配置（Point-to-Plane ICP 精化）
# ================================================================================
# BTC给出初值 → GICP精化 → 输出精确相对位姿

gicp:
  # 是否启用 GICP 精化
  #   - true: BTC粗匹配 → GICP精化（推荐）
  #   - false: 只用BTC位姿（快但不精确）
  enabled: true

  # fitness_score_threshold: GICP fitness 阈值 (PCL基类getFitnessScore(1m))
  #   - 与在线定位 registration_impl.cpp 一致的计算方式
  #   - 对变换后source点做NN搜索，平均距离 < threshold 才接受
  #   - 0.05: 严格（平均NN距离<5cm，优秀匹配）
  #   - 0.15: 适中（适合Mid360稀疏点云）
  #   - 0.30: 宽松
  #   - 策略：放宽到0.25，作为最终把关（效果不好再收紧）
  fitness_score_threshold: 0.08

  # max_correspondence_distance: 最大对应点距离 (m)
  #   - GICP匹配时，两点距离 < 此阈值才算对应点
  #   - 小值 (2.0): 严格 → 匹配点少但精确
  #   - 大值 (5.0): 宽松 → 匹配点多（适合初值误差大）
  max_correspondence_distance: 10.0

  # max_iterations: 精配准最大迭代次数
  #   - 迭代次数上限，防止不收敛时无限循环
  max_iterations: 32

  # transformation_epsilon: 收敛精度（变换增量阈值）
  #   - 变换增量 < 此阈值时停止迭代（收敛）
  transformation_epsilon: 0.001

  # gicp_epsilon: GICP协方差正则化
  #   - 防止协方差矩阵奇异（点对太少时）
  gicp_epsilon: 0.00001

  # scan_ds_size: 点云下采样体素 (m)
  #   - GICP配准前对点云下采样，减少点数加快配准
  #   - 小值 (0.1): 点多 → 精确但慢
  #   - 大值 (0.4): 点少 → 快但粗糙
  scan_ds_size: 0.1

  # coarse_max_dist: 粗配准最大对应距离 (m)
  #   - 粗配准阶段用更大对应距离，帮助收敛
  #   - 通常 > max_correspondence_distance
  coarse_max_dist: 10.0

  # max_init_translation: GICP初始平移阈值 (m)
  #   - GICP初始位姿的平移分量超过此值时，跳过验证（避免GICP崩溃）
  #   - 小值 (10.0): 严格限制初始平移（适合场景小、回环初值准）
  #   - 大值 (20.0): 放宽限制（适合场景大、回环初值不准）
  #   - ⚠️ 此阈值应用于Odom Direct和BTC Loop两种流程
  max_init_translation: 10.0

  # coarse_ds_size: 粗配准下采样体素 (m)
  #   - 粗配准阶段用更粗下采样，加快收敛
  #   - 通常 > scan_ds_size
  coarse_ds_size: 0.25

  # coarse_max_iter: 粗配准最大迭代次数
  coarse_max_iter: 50


# ================================================================================
# ROS2 节点参数（laserPGO node）
# ================================================================================
# 通过 ros2 launch 加载到 laserPGO 节点的 ros__parameters
# ================================================================================

laserPGO:
  ros__parameters:
    # 基础配置
    scan_line: 4
    minimum_range: 0.3
    mapping_line_resolution: 0.4
    mapping_plane_resolution: 0.8
    mapviz_filter_size: 0.05

    # 关键帧配置
    keyframe_meter_gap: 5.0
    keyframe_deg_gap: 10.0

    # ScanContext 参数
    sc_dist_thres: 0.3
    sc_max_radius: 290.0

    # 保存配置
    save_directory: "/home/ywj/save_data/"
    save_map_service_name: "save_map"
    map_filename: "map.pcd"

    # 坐标系配置
    frame_id_odom: "odom"
    frame_id_aft_pgo: "aft_pgo"

    # GICP 精化配置
    use_gicp_for_loop_closure: true
    gicp_fitness_score_threshold: 0.5
    gicp_transformation_epsilon: 0.000001
    gicp_max_correspondence_distance: 30.0
    gicp_max_iterations: 100
    gicp_num_threads: 4
    gicp_max_init_translation: 15.0
    gicp_scan_ds_size: 0.1
    gicp_coarse_ds_size: 0.25
    gicp_coarse_max_iter: 50
    gicp_coarse_max_dist: 10.0

    # 回环验证配置
    max_loop_distance: 100.0
    max_yaw_diff: 2.35619
    odom_direct_threshold: 3.0



