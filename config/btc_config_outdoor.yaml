%YAML:1.0
# BTC 配置 - 室外/开阔场景适配版
# 针对: 单层LiDAR扫描、平面稀疏场景

# ========== 平面检测参数 ==========
# 体素大小 - 保持与C++一致
voxel_size: 1.0

# 体素内最小点数 - 降低以适应稀疏点云
voxel_init_num: 5

# 平面检测阈值 - 保持
plane_detection_thre: 0.01

# ========== 平面合并参数 ==========
# 法向量阈值 - 保持
plane_merge_normal_thre: 0.1
# 距离阈值 - 保持
plane_merge_dis_thre: 0.3

# ========== 二进制描述子参数 ==========
# 投影平面数 - 增加（多方向投影以获得更多描述子）
proj_plane_num: 5

# 投影距离范围 - 保持（0-5m覆盖单层扫描）
proj_dis_min: 0
proj_dis_max: 5

# 2D网格分辨率 - 保持
proj_image_resolution: 0.5
proj_image_high_inc: 0.5

# 最小占据层数 - **关键调整**：降低以适应单层扫描
summary_min_thre: 3

# 线过滤器 - 保持关闭
line_filter_enable: 0

# ========== BTC 生成参数 ==========
# KNN近邻数 - 降低（允许较少描述子也能生成三角形）
descriptor_near_num: 5

# 三角形边长范围 - 保持
descriptor_min_len: 1
descriptor_max_len: 10

# 有用角点数 - 降低
useful_corner_num: 20

# ========== 回环检测参数 ==========
# 跳过近邻帧数 - **关键调整**：因为静态场景帧间距离极小
skip_near_num: 5

# 候选数 - 保持
candidate_num: 50

# ========== 验证参数 ==========
# 距离阈值 - 保持
rough_dis_threshold: 0.03
# 相似度阈值 - 保持
similarity_threshold: 0.7
# ICP阈值 - 保持
icp_threshold: 0.5

# ========== 其他参数 ==========
# 法向量阈值 - 保持
normal_threshold: 0.1
# 距离阈值 - 保持
dis_threshold: 0.3
# 三角形分辨率 - 保持
triangle_resolution: 0.2